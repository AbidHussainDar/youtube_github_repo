<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Form - Sky Blue</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #87CEEB, #00BFFF);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 550px;
      box-shadow: 0 7px 30px rgba(0,0,0,0.2);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00BFFF;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #555;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #00BFFF;
      box-shadow: 0 0 5px rgba(0,191,255,0.5);
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #0c75ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #009acd;
    }

    .footer-text {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }

    .footer-text a {
      color: #00BFFF;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Register</h2>

    <form>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password" required>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>

      <button class="btn">Register</button>

      <div class="footer-text">
        Already have an account? <a href="#">Login</a>
      </div>
    </form>
  </div>

</body>
</html>
