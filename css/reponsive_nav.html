<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Navbar</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #f5f7ff;
        min-height: 100vh;
      }

      /* NAVBAR */
      nav {
        width: 100%;
        background: linear-gradient(135deg, #6c10c8, #8d40db);
        padding: 16px 8%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .logo {
        color: #ffd230;
        font-size: 28px;
        font-weight: 700;
        text-decoration: none;
      }

      .logo span {
        color: white;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 35px;
      }

      .nav-links a {
        text-decoration: none;
        color: white;
        font-size: 17px;
        font-weight: 500;
        transition: 0.3s;
        position: relative;
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -6px;
        width: 0%;
        height: 3px;
        background: #ffd230;
        transition: 0.3s;
        border-radius: 10px;
      }

      .nav-links a:hover::after {
        width: 100%;
      }

      .nav-links a:hover {
        color: #ffd230;
      }

      .btn {
        background: #ffd230;
        color: #222;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn:hover {
        transform: translateY(-3px);
        background: white;
      }

      /* MENU ICON */
      .menu-btn {
        color: white;
        font-size: 28px;
        cursor: pointer;
        display: none;
      }

      #menu-toggle {
        display: none;
      }

      /* HERO */
      .hero {
        height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      .hero h1 {
        font-size: clamp(35px, 6vw, 70px);
        background: linear-gradient(135deg, #4f029b, #9d5bdf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 20px;
        text-shadow: 0 5px 20px rgba(104, 15, 237, 0.322);
      }

      .hero p {
        max-width: 700px;
        margin: auto;
        color: #555;
        line-height: 1.7;
        font-size: 18px;
      }

      /* RESPONSIVE */
      @media (max-width: 900px) {
        .menu-btn {
          display: block;
        }

        .nav-links {
          position: absolute;
          top: 100%;
          left: -100%;
          width: 100%;
          background: #7331b4;
          flex-direction: column;
          text-align: center;
          padding: 30px 0;
          transition: 0.4s;
        }

        .nav-links li {
          margin: 18px 0;
        }

        #menu-toggle:checked ~ .nav-links {
          left: 0;
        }

        .btn {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="#" class="logo">Bab-ul-<span>Code</span></a>
      <input type="checkbox" id="menu-toggle" />

      <label for="menu-toggle" class="menu-btn">
        <i class="fa-solid fa-bars"></i>
      </label>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <a href="#" class="btn">Get Started</a>
    </nav>

    <section class="hero">
      <div>
        <h1>Modern Responsive Navbar</h1>
        <p>
          Beautiful responsive navigation bar using HTML & CSS only.
          Mobile-friendly design with smooth hover effects and hamburger menu.
        </p>
      </div>
    </section>
  </body>
</html>
