<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXT Formatting </title>
</head>
<body>
    <!-- these are headings -->
   <h1 style="font-size: 30px; color: blue;  font-family:'Courier New', Courier, monospace;">Heading 1</h1>
   <h2 style="color: brown;">Heading 2</h2>
   <h3 style="color: green;">Heading 3</h3>
   <h4 style="color: purple;">Heading 4</h4>
   <h5 style="color: orange;">Heading 5</h5>
   <h6 style="color: red;">Heading 6</h6>
   <!--Paragraph text -->
   <p>This <em>Channel</em> is <i>regrading</i> <b>web development.</b> with <strong>AI</strong></p>

   <p>co<sub>2</sub></p>

   <h3>Price: Rs <del>1000</del> 900</h3>
   <h4>some text <ins>inserted</ins></h4>
    <p>This is <mark>highlighted</mark> text</p>
    <p> this is <u>underlined</u> text</p>
    <p>this is <small>small text</small></p>
</body>
</html>
