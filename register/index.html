<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Html</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-image: url('../images/Gemini_Generated_Image_4wenoz4wenoz4wen.png');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        /* background-color: #e3e3e3; */
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
      }
      .register_cont {
        text-align: center;
        width: 500px;
        background-color: #ffffff69;
        backdrop-filter: blur(5px);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .register_cont .form-group{
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 10px;
        /* border:1px solid #e3e3e3; */
      }
      .form-group label, .aggree{
        margin-bottom: 5px;
        color:#0a0a0a;
      }
      .form-group input, .form-group select{
        width: 100%;
        padding: 15px;
        border:1px solid #c4c4c4;
        border-radius: 7px;
        background-color: #ffffffa6;
      }
      .gender_chose{
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .chose_label{
        margin-bottom: 20px !important;
      }
      .gender_chose label{
        margin: 0;
      }
      .terms{
        text-align: left;
        padding: 10px;
      }
     button{
        margin-top: 20px;
        width: 100%;
        padding: 15px;
        background-color: #000000b7;
        color: #fff;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        backdrop-filter: blur(5px);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
     }
    </style>
  </head>
  <body>
    <div class="register_cont">
      <h1>Register Here</h1>
      <form>
        <div class="form-group">
          <label for="fullname">Full name</label>
          <input type="text" placeholder="Enter full name" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" placeholder="Enter email" />
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" placeholder="Enter phone number" />
        </div>
        <div class="form-group">
          <label for="state">Select State</label>
          <select>
            <option value="">-- Select State --</option>
            <option value="ca">Srinagar</option>
            <option value="tx">Punjab</option>
            <option value="ny">Up</option>
            <option value="ny">Delhi</option>
          </select>
        </div>
        <div class="form-group">
        <label for="" class="chose_label">Chose Gender</label>
          <label for="gender" class="gender_chose">
            <input type="radio" name="gender" id="male" />
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" />
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other" />
            <label for="other">Other</label>
          </label>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" placeholder="Enter password" />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" placeholder="Enter password again" />
        </div>
        <div class="terms">
          <label for="terms" >
            <input type="checkbox" >
            <span class="aggree">I agree to the terms and conditions</span>
          </label>
        </div>

        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
