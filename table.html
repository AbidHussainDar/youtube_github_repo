<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table | Html</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #e3e3e3;
        font-family: sans-serif;
      }
      h2 {
        text-align: center;
        margin: 20px 0;
        color: rgb(237, 65, 2);
      }
      table {
        width: 100%;
      }
      table,
      th,
      td {
        border: 1px solid #000;
        border-collapse: collapse;
      }
      thead {
        background-color: #000;
        color: #fff;
        text-align: left;
      }
      thead th {
        padding: 10px;
        border-color: #fff;
      }
      td {
        padding: 5px;
      }
      h4 {
        margin: 10px ;
        color: crimson;
      }
    </style>
  </head>
  <body>
    <h2>Html Table</h2>
    <div>
        <h4>Student Information</h4>
      <table>
        <thead>
          <tr>
            <th>S.no</th>
            <th>Name</th>
            <th>Age</th>
            <th>class</th>
            <th>Subject</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>20</td>
            <td>10th</td>
            <td>Math</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Jane Smith</td>
            <td>22</td>
            <td>12th</td>
            <td>Science</td>
          </tr>
          <tr>
            <td>3</td>
            <td>Emily Johnson</td>
            <td>19</td>
            <td>11th</td>
            <td>History</td>
          </tr>
          <tr>
            <td>4</td>
            <td>Michael Brown</td>
            <td>21</td>
            <td>12th</td>
            <td>English</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
