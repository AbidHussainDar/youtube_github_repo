<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML COLORS</title>
</head>
<body>
    <!-- Color using names -->
     <h1>Color with names</h1>
     <h1 style="color: red;">Hello world</h1>
     <h1 style="color: blue;">Hello world</h1>
     <h1 style="color: green;">Hello world</h1>
     <!-- Color using hexadecimal values -->
     <h1>Color with hexadecimal values 1-9 a-f</h1>
     <!-- 1-9 a-f -->
        <h1 style="color: #dc2f02;">Hello world</h1>
        <h1 style="color: #2ec4b6;">Hello world</h1>
        <h1 style="color: #00ff00;">Hello world</h1>
        <h1 style="color: #901dfc;">Hello world</h1>

        <!-- Color using RGB values -->
        <h1>Color with RGB values 0-255</h1>
        <h1 style="color: rgb(255, 0, 0);">Hello world</h1>
        <h1 style="color: rgb(0, 0, 255);">Hello world</h1>
        <h1 style="color: rgb(0, 255, 0);">Hello world</h1>
        <h1 style="color: rgb(80, 213, 4);">Hello world</h1>

        <!-- Color using rgba values -->
        <h1>Color with RGBA values</h1>
        <h1 style="color: rgb(255, 0, 0); background-color: rgba(255, 0, 0, .7);">Hello world</h1>


    
</body>
</html>
